text_mode: false
allow_text_files: false
model:
  task_type: infonce
  task_loader_type: contrastive
  name: tree_matching
  model_type: embedding
  graph:
    node_feature_dim: 804
    edge_feature_dim: 70
    node_state_dim: 1536
    edge_state_dim: 768
    edge_hidden_sizes:
    - 768
    - 1024
    node_hidden_sizes:
    - 1536
    - 1536
    graph_rep_dim: 2048
    graph_transform_sizes:
    - 1536
    - 1536
    edge_net_init_scale: 0.1
    reverse_dir_param_different: false
    use_reverse_direction: true
    share_prop_params: true
    n_prop_layers: 5
  temperature: 0.05
data:
  dataset_type: wikiqs
  dataset_specs:
  - wikiqs
  - amazonqa_single/Electronics
  - amazonqa_single/Baby
  - amazonqa_multiple/Baby
  - amazonqa_multiple/Electronics
  - amazonqa_single/Home_and_Kitchen
  - amazonqa_single/Industrial_and_Scientific
  - amazonqa_single/Sports_and_Outdoors
  - amazonqa_single/Appliances
  - amazonqa_single/Arts_Crafts_and_Sewing
  - amazonqa_single/Automotive
  - amazonqa_single/Beauty
  - amazonqa_single/Cell_Phones_and_Accessories
  - amazonqa_single/Clothing_Shoes_and_Jewelry
  - amazonqa_single/Grocery_and_Gourmet_Food
  - amazonqa_single/Health_and_Personal_Care
  - amazonqa_single/Musical_Instruments
  - amazonqa_single/Office_Products
  - amazonqa_single/Patio_Lawn_and_Garden
  - amazonqa_single/Pet_Supplies
  - amazonqa_single/Software
  - amazonqa_single/Tools_and_Home_Improvement
  - amazonqa_single/Toys_and_Games
  - amazonqa_single/Video_Games
  - amazonqa_multiple/Home_and_Kitchen
  - amazonqa_multiple/Industrial_and_Scientific
  - amazonqa_multiple/Sports_and_Outdoors
  - amazonqa_multiple/Appliances
  - amazonqa_multiple/Arts_Crafts_and_Sewing
  - amazonqa_multiple/Automotive
  - amazonqa_multiple/Beauty
  - amazonqa_multiple/Cell_Phones_and_Accessories
  - amazonqa_multiple/Clothing_Shoes_and_Jewelry
  - amazonqa_multiple/Grocery_and_Gourmet_Food
  - amazonqa_multiple/Health_and_Personal_Care
  - amazonqa_multiple/Musical_Instruments
  - amazonqa_multiple/Office_Products
  - amazonqa_multiple/Patio_Lawn_and_Garden
  - amazonqa_multiple/Pet_Supplies
  - amazonqa_multiple/Software
  - amazonqa_multiple/Tools_and_Home_Improvement
  - amazonqa_multiple/Toys_and_Games
  - amazonqa_multiple/Video_Games
  allow_cross_dataset_negatives: false  # Changed: Force single-dataset batches for better negatives
  batch_size: 256
  strict_matching: false
  pos_pairs_per_anchor: 4  # OPTIMAL from sweep: most consistent performance
  neg_pairs_per_anchor: 10  # Ignored when hard negative mining enabled (use max_negatives_per_anchor instead)
  min_groups_per_batch: 8
  anchors_per_group: 1  # ONLY STABLE CONFIGURATION (A>1 causes instability)
  num_workers: 2
  positive_pairing_ratio: 1.0
  ensure_positives_in_batch: true
  prefetch_factor: 2
  max_batches_per_epoch: 600
  max_text_chars: 500

  # Hard negative mining configuration
  use_hard_negative_mining: true  # Enabled: weighted sampling for stable hard negative mining
  hard_negative_mining:
    # Negative sampling strategy: 'fixed' or 'ratio_based'
    # - 'fixed': Use max_negatives_per_anchor regardless of positives
    # - 'ratio_based': Scale negatives based on positives (negatives = positives * target_ratio)
    negative_sampling_mode: "ratio_based"  # 'fixed' | 'ratio_based'

    # For 'fixed' mode: Use this many negatives per anchor
    max_negatives_per_anchor: 10

    # For 'ratio_based' mode: Maintain this target ratio
    # Actual negatives = pos_pairs_per_anchor * target_neg_to_pos_ratio
    # Examples:
    #   pos=1, ratio=10 → 10 negatives (1:10)
    #   pos=3, ratio=10 → 30 negatives (1:10)
    #   pos=4, ratio=8  → 32 negatives (1:8)
    target_neg_to_pos_ratio: 25  # OPTIMAL from sweep: most consistent performance

    # Sampling strategy: how to select from ranked candidates
    # - 'top_k': Select top K most similar (deterministic, hardest)
    # - 'weighted': Sample with probability proportional to similarity (stochastic)
    # - 'random': Random sample from survivors (for ablation studies)
    sampling_strategy: "weighted"

    # Stage 1: Structural filtering (eliminate dissimilar items)
    use_structural_filtering: true
    structural_features:
      # Order determines filtering sequence (lower = earlier)
      # Each feature filters candidates to be within threshold of anchor

      - name: "node_count"
        threshold: 0.3  # Keep items within ±30% of anchor's node count
        weight: 1.0     # Weight in similarity score accumulation
        order: 1        # First filtering pass

      - name: "max_depth"
        threshold: 0.3  # Keep items within ±30% of anchor's max depth
        weight: 0.8
        order: 2        # Second filtering pass

      # Additional features (uncomment to use):
      # - name: "edge_count"
      #   threshold: 0.3
      #   weight: 0.5
      #   order: 3

      # - name: "avg_depth"
      #   threshold: 0.4
      #   weight: 0.6
      #   order: 4

      # - name: "leaf_ratio"
      #   threshold: 0.5
      #   weight: 0.4
      #   order: 5

    # Stage 2: Semantic ranking (rank by embedding similarity)
    use_semantic_ranking: true
    semantic_weight: 2.0  # Weight for mean-pooled embedding similarity

embedding_cache_dir: /home/jlunder/research/TMN_DataGen/embedding_cache5/
use_gpu: false
train:
  learning_rate: 1.0e-06
  weight_decay: 1.0e-05
  n_epochs: 50
  patience: 999
  gradient_accumulation_steps: 1
  clip_value: 1.0
  cleanup_interval: 5
  base_seed: 42
  reset_epoch_enabled: true
  checkpoint_save_frequency: 5
wandb:
  project: tree-embedding
  tags:
  - contrastive
  - wikiqs
  - tree_embedding
  log_interval: 10
  memory_logging: true
