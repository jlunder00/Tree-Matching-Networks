# Authored by: Jason Lunder, Github: https://github.com/jlunder00/
# Embedding Models Aggregative Training Config  
# Switch between TreeEmbeddingNet and BertEmbeddingNet by changing text_mode
# TreeEmbeddingNet: text_mode: False
# BertEmbeddingNet: text_mode: True

text_mode: False  # CHANGE THIS: False=TreeEmbeddingNet, True=BertEmbeddingNet
allow_text_files: False
model:
  task_type: entailment
  task_loader_type: aggregative
  model_type: embedding  # Key parameter for embedding variants
  
  bert:
    hidden_size: 1024
    num_hidden_layers: 4
    num_attention_heads: 16
    intermediate_size: 2048
    max_position_embeddings: 384
    tokenizer_path: /home/jlunder/local_storage/tokenizers/bert-tokenizer5000_5/
    project: False
  
  graph:
    node_feature_dim: 804
    edge_feature_dim: 70
    node_state_dim: 1536
    edge_state_dim: 768
    edge_hidden_sizes: 
      - 768
      - 1024
    node_hidden_sizes: 
      - 1536
      - 1536
    
    graph_rep_dim: 2048
    graph_transform_sizes: 
      - 1536
      - 1536

    edge_net_init_scale: 0.1
    reverse_dir_param_different: false
    use_reverse_direction: true
    share_prop_params: true
    n_prop_layers: 5

  temperature: 0.05
  aggregation: attention

  # For entailment task
  positive_infonce_weight: 0.55
  inverse_infonce_weight: 0.30
  midpoint_infonce_weight: 0.15
  thresh_low: -0.33
  thresh_high: 0.33

  # For binary task
  threshold: 0.0

data:
  dataset_type: snli
  batch_size: 416
  strict_matching: False
  min_trees_per_group: 1
  num_workers_train: 0
  num_workers_val: 0
  prefetch_factor: 0
  max_batches_per_epoch: 1000
  contrastive_mode: False
  allow_negatives: True
  allow_neutrals: True
  allow_positives: True
  num_workers: 0

embedding_cache_dir: '/home/jlunder/research/TMN_DataGen/embedding_cache5/'
use_gpu: false

train:
  learning_rate: 0.000001
  weight_decay: 0.00001
  n_epochs: 500
  patience: 10
  gradient_accumulation_steps: 1
  clip_value: 1.0
  cleanup_interval: 5

wandb:
  project: tree-embedding
  tags: [aggregative, embedding, snli]
  log_interval: 10
  memory_logging: true