text_mode: true
allow_text_files: false
model:
  task_type: similarity
  task_loader_type: aggregative
  name: pretrained_text
  model_type: embedding
  pretrained:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    freeze_transformer: false
  graph:
    graph_rep_dim: 2048
  temperature: 0.05
  aggregation: attention
  thresh_low: -0.5
  thresh_high: 0.5
data:
  dataset_type: semeval
  batch_size: 256
  strict_matching: false
  min_trees_per_group: 1
  num_workers_train: 0
  num_workers_val: 0
  prefetch_factor: 0
  max_batches_per_epoch: 600
  contrastive_mode: false
  allow_negatives: true
  allow_neutrals: false
  allow_positives: true
  num_workers: 0
embedding_cache_dir: /home/jlunder/research/TMN_DataGen/embedding_cache5/
use_gpu: false
train:
  learning_rate: 5.0e-06
  pretrained_lr_scale: 0.1
  weight_decay: 1.0e-05
  n_epochs: 100
  patience: 999
  gradient_accumulation_steps: 1
  clip_value: 1.0
  cleanup_interval: 5
  base_seed: 42
  reset_epoch_enabled: true
  checkpoint_save_frequency: 4
wandb:
  project: tree-embedding
  tags:
  - finetune
  - embedding
  - semeval
  - pretrained_text
  log_interval: 10
  memory_logging: true
