# Authored by: Jason Lunder, Github: https://github.com/jlunder00/
# TreeEmbeddingNet Contrastive Pretraining Config WITH TRANSFORMER AGGREGATION
# For embedding vs matching comparison experiments with transformer-based aggregation

text_mode: False  # Tree models don't use text mode
allow_text_files: False
model:
  task_type: infonce
  task_loader_type: contrastive
  name: tree_matching        # Use tree architecture
  model_type: embedding      # Key change: embedding instead of matching

  graph:
    node_feature_dim: 804
    edge_feature_dim: 70
    node_state_dim: 896       # OPTIMIZED for 40M parameters with 2 transformer layers
    edge_state_dim: 256       # Reduced to save parameters

    # Hidden size multiplier - controls final layer size in propagation
    # 1.0x for embedding models saves parameters while maintaining depth
    hidden_size_multiplier: 2.0

    #both edge and node hidden sizes will have a node_state_dim*hidden_size_multiplier layer appended in model definition
    edge_hidden_sizes:
      - 256      # Match edge_state_dim
      - 512      # Intermediate layer (proportional)
    node_hidden_sizes:
      - 896      # Match node_state_dim
      - 896      # Match node_state_dim

    graph_rep_dim: 2048
    #graph_transform_sizes wil have graph_rep_dim appended on it
    graph_transform_sizes:
      - 896
      - 896

    edge_net_init_scale: 0.1
    reverse_dir_param_different: false
    use_reverse_direction: true
    share_prop_params: true

    n_prop_layers: 4          # Reduced from 5 to balance parameters

    # TRANSFORMER AGGREGATION CONFIGURATION
    transformer:
      # Enable transformer-based aggregation (replaces pooling)
      use_transformer_aggregation: true

      # Attention mechanism parameters
      max_nodes: 64                      # Maximum nodes per tree (padding limit)
      num_heads: 8                       # Multi-head attention heads
      num_layers: 2                      # Transformer encoder layers
      dropout: 0.1                       # Dropout rate

      # Tree shape positional encoding features
      # Using dimension partitioning for perfect orthogonality
      positional_features:
        - depth
        - num_siblings
        - num_children
        - num_grandparent_children
        - subtree_size
        - parent_num_children
        - distance_to_leaf
        - nodes_at_level

      # Maximum values for positional features (for normalization)
      positional_max_values:
        depth: 15
        num_siblings: 10
        num_children: 10
        num_grandparent_children: 10
        subtree_size: 40
        parent_num_children: 10
        distance_to_leaf: 10
        nodes_at_level: 20

  temperature: 0.05

data:
  dataset_type: wikiqs
  dataset_specs:
    - wikiqs
    - amazonqa_single/Electronics
    - amazonqa_single/Baby
    - amazonqa_multiple/Baby
    - amazonqa_multiple/Electronics
    - amazonqa_single/Home_and_Kitchen
    - amazonqa_single/Industrial_and_Scientific
    - amazonqa_single/Sports_and_Outdoors
    - amazonqa_single/Appliances
    - amazonqa_single/Arts_Crafts_and_Sewing
    - amazonqa_single/Automotive
    - amazonqa_single/Beauty
    - amazonqa_single/Cell_Phones_and_Accessories
    - amazonqa_single/Clothing_Shoes_and_Jewelry
    - amazonqa_single/Grocery_and_Gourmet_Food
    - amazonqa_single/Health_and_Personal_Care
    - amazonqa_single/Musical_Instruments
    - amazonqa_single/Office_Products
    - amazonqa_single/Patio_Lawn_and_Garden
    - amazonqa_single/Pet_Supplies
    - amazonqa_single/Software
    - amazonqa_single/Tools_and_Home_Improvement
    - amazonqa_single/Toys_and_Games
    - amazonqa_single/Video_Games
    - amazonqa_multiple/Home_and_Kitchen
    - amazonqa_multiple/Industrial_and_Scientific
    - amazonqa_multiple/Sports_and_Outdoors
    - amazonqa_multiple/Appliances
    - amazonqa_multiple/Arts_Crafts_and_Sewing
    - amazonqa_multiple/Automotive
    - amazonqa_multiple/Beauty
    - amazonqa_multiple/Cell_Phones_and_Accessories
    - amazonqa_multiple/Clothing_Shoes_and_Jewelry
    - amazonqa_multiple/Grocery_and_Gourmet_Food
    - amazonqa_multiple/Health_and_Personal_Care
    - amazonqa_multiple/Musical_Instruments
    - amazonqa_multiple/Office_Products
    - amazonqa_multiple/Patio_Lawn_and_Garden
    - amazonqa_multiple/Pet_Supplies
    - amazonqa_multiple/Software
    - amazonqa_multiple/Tools_and_Home_Improvement
    - amazonqa_multiple/Toys_and_Games
    - amazonqa_multiple/Video_Games
  allow_cross_dataset_negatives: true
  batch_size: 448
  strict_matching: False
  pos_pairs_per_anchor: 1
  neg_pairs_per_anchor: 10
  min_groups_per_batch: 8
  anchors_per_group: 1
  num_workers: 2
  positive_pairing_ratio: 1.0
  ensure_positives_in_batch: True
  prefetch_factor: 2
  max_batches_per_epoch: 100
  max_text_chars: 500

embedding_cache_dir: '/home/jlunder/research/TMN_DataGen/embedding_cache5/'
use_gpu: false

train:
  learning_rate: 0.000001
  weight_decay: 0.00001
  n_epochs: 500
  patience: 10
  gradient_accumulation_steps: 1
  clip_value: 1.0
  cleanup_interval: 5

wandb:
  project: tree-embedding-transformer
  tags: [contrastive, wikiqs, tree_embedding, transformer]
  log_interval: 10
  memory_logging: true
