text_mode: false
allow_text_files: false
model:
  task_type: entailment
  task_loader_type: aggregative
  model_type: matching
  name: tree_matching
  bert:
    hidden_size: 1024
    num_hidden_layers: 4
    num_attention_heads: 16
    intermediate_size: 2048
    max_position_embeddings: 384
    tokenizer_path: /home/jlunder/temp_temp_storage/tokenizers/bert-tokenizer5000_5/
    project: false
  graph:
    node_feature_dim: 804
    edge_feature_dim: 70
    node_state_dim: 952
    edge_state_dim: 256
    edge_hidden_sizes:
    - 512
    node_hidden_sizes:
    - 1024
    graph_rep_dim: 2048
    graph_transform_sizes:
    - 1024
    edge_net_init_scale: 0.1
    reverse_dir_param_different: false
    use_reverse_direction: true
    share_prop_params: true
    n_prop_layers: 5
  temperature: 0.05
  aggregation: attention
  thresh_low: -0.33
  thresh_high: 0.33
data:
  dataset_type: snli
  batch_size: 256
  strict_matching: false
  min_trees_per_group: 1
  num_workers_train: 0
  num_workers_val: 0
  prefetch_factor: 0
  max_batches_per_epoch: 600
  contrastive_mode: false
  allow_negatives: true
  allow_neutrals: true
  allow_positives: true
  num_workers: 0
embedding_cache_dir: /home/jlunder/research/TMN_DataGen/embedding_cache5/
use_gpu: false
train:
  learning_rate: 5.0e-07
  weight_decay: 1.0e-05
  n_epochs: 100
  patience: 999
  gradient_accumulation_steps: 1
  clip_value: 1.0
  cleanup_interval: 5
  base_seed: 42
  reset_epoch_enabled: true
  checkpoint_save_frequency: 4
wandb:
  project: tree-embedding
  tags:
  - finetune
  - matching
  - medium_19m
  - snli
  - seed_reset
  log_interval: 10
  memory_logging: true
