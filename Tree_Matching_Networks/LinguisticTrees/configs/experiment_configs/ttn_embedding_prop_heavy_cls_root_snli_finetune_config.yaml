text_mode: false
allow_text_files: false
model:
  task_type: entailment
  task_loader_type: aggregative
  name: tree_embedding
  model_type: embedding
  graph:
    node_feature_dim: 804
    edge_feature_dim: 70
    node_state_dim: 1280
    edge_state_dim: 512
    hidden_size_multiplier: 2.0
    edge_hidden_sizes:
    - 512
    - 1024
    node_hidden_sizes:
    - 1280
    - 1280
    graph_rep_dim: 2048
    graph_transform_sizes:
    - 1280
    - 2048
    edge_net_init_scale: 0.1
    reverse_dir_param_different: false
    use_reverse_direction: true
    share_prop_params: true
    n_prop_layers: 5
    transformer:
      use_transformer_aggregation: true
      use_cls_token: true
      cls_token_type: root
      internal_dim: 1024
      max_nodes: 64
      num_heads: 8
      num_layers: 2
      dropout: 0.1
      positional_features:
      - depth
      - num_siblings
      - num_children
      - num_grandparent_children
      - subtree_size
      - parent_num_children
      - distance_to_leaf
      - nodes_at_level
      positional_max_values:
        depth: 15
        num_siblings: 10
        num_children: 10
        num_grandparent_children: 10
        subtree_size: 40
        parent_num_children: 10
        distance_to_leaf: 10
        nodes_at_level: 20
  temperature: 0.05
  aggregation: attention
  thresh_low: -0.33
  thresh_high: 0.33
data:
  dataset_type: snli
  batch_size: 256
  strict_matching: false
  min_trees_per_group: 1
  num_workers_train: 0
  num_workers_val: 0
  prefetch_factor: 0
  max_batches_per_epoch: 600
  contrastive_mode: false
  allow_negatives: true
  allow_neutrals: true
  allow_positives: true
  num_workers: 0
embedding_cache_dir: /home/jlunder/research/TMN_DataGen/embedding_cache5/
use_gpu: false
train:
  learning_rate: 5.0e-07
  weight_decay: 1.0e-05
  n_epochs: 100
  patience: 999
  gradient_accumulation_steps: 1
  clip_value: 1.0
  cleanup_interval: 5
  base_seed: 42
  reset_epoch_enabled: true
  checkpoint_save_frequency: 4
wandb:
  project: tree-embedding
  tags:
  - finetune
  - embedding
  - snli
  - supervised
  - ttn
  - prop_heavy
  - cls-root
  log_interval: 10
  memory_logging: true
